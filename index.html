<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innotec HTML Hub</title>

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --yellow: rgb(255, 211, 0);
      --bg: #e9e6db;
      --card: #f5f3eb;
      --text: #1a2233;
      --muted: #6b7280;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      border-radius: 24px;
      overflow: hidden;
      background: #f8f6ef;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    /* HEADER */
    .header {
      background: var(--yellow);
      padding: 28px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1;
    }

    .header p {
      margin: 6px 0 0;
      font-size: 15px;
      opacity: 0.9;
    }

    /* LOGO BOX */
    .logo-box {
      background: rgba(255,255,255,0.6);
      padding: 8px 12px;
      border-radius: 12px;
      display: flex;
      align-items: center;
    }

    .logo-box img {
      height: 38px;
      width: auto;
    }

    /* CONTENT */
    .content {
      padding: 30px;
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 25px;
    }

    /* CARD */
    .card {
      display: block;
      text-decoration: none;
      background: var(--card);
      border: 2px solid rgba(255, 211, 0, 0.6);
      border-radius: 18px;
      padding: 20px;
      transition: 0.2s ease;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.08);
    }

    .tag {
      display: inline-block;
      background: rgba(255, 211, 0, 0.2);
      border: 1px solid rgba(255, 211, 0, 0.6);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .card p {
      margin: 0 0 15px;
      color: var(--muted);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      font-weight: 700;
    }

    .arrow {
      width: 34px;
      height: 34px;
      background: var(--yellow);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <div>
        <h1>Innotec HTML Hub</h1>
        <p>Übersicht aller Kalkulatoren und Tools.</p>
      </div>

      <div class="logo-box">
        <img src="./logo.png" alt="Innotec Logo">
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <div class="title">Auswahl</div>
      <div class="subtitle">
        Wähle eine Seite und öffne sie direkt im Browser.
      </div>

      <!-- EINZIGER EINTRAG -->
      <a class="card" href="./additive-rechner/">
        <div class="tag">Kalkulator</div>
        <h3>Mehrwert-Berechnung Additive</h3>
        <p>
          Vergleich von Preisvorteilen und Berechnung des Gesamtertrags eines neuen Geschäftsfelds.
        </p>

        <div class="footer">
          <span class="btn">Seite öffnen</span>
          <div class="arrow">→</div>
        </div>
      </a>

    </div>
  </div>
</body>
</html>
